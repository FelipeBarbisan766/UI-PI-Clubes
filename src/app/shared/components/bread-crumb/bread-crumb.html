<div class="breadcrumbs text-sm mb-6" aria-label="Breadcrumb">
  <ul>
    <li>
      <a routerLink="/admin/clubs">Início</a>
    </li>

    @if (breadcrumbs$ | async; as crumbs) {
      @for (crumb of crumbs; track crumb.url ?? crumb.label; let last = $last) {
        <li>
          @if (!last) {
            <a [routerLink]="crumb.url">{{ crumb.label }}</a>
          } @else {
            <span
              class="font-semibold text-base-content/70"
              aria-current="page"
            >
              {{ crumb.label }}
            </span>
          }
        </li>
      }
    }
  </ul>
</div>

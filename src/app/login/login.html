<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Clubera</title>
</head>

<body style="margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#1f1f1f,#3a3a3a); font-family:Arial, sans-serif;">

  <div style="background:#fff; padding:40px; border-radius:12px; width:110%; max-width:450px; box-shadow:0 10px 25px rgba(0,0,0,0.3); text-align:center;">

    <h1 style="margin-bottom:30px; color:#7b2cbf; font-size:16px;">Entre na sua conta</h1>

    <form>
      
      <div style="margin-bottom:25px; text-align:left;">
        <label style="display:block; margin-bottom:1px; font-size:14px; color:#121111;">Email</label>
        <input type="email" placeholder="Digite seu email" required
          style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; outline:none;">
      </div>

      <div style="margin-bottom:30px; text-align:left;">
        <label style="display:block; margin-bottom: 1px; font-size:14px; color:#121111;">Senha</label>
        <input type="password" placeholder="Digite sua senha" required
          style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; outline:none;">
      </div>

      <button type="submit"
        style="width:100%; padding:15px; background:#7b2cbf; border:none; border-radius:8px; color:#fff; font-size:16px; cursor:pointer;">
        Entrar
      </button>

      <div style="margin-top:35px; font-size:13px;">
        <p style="font-size: 17px; text-decoration: none;">Não tem conta? 
          <a href="#" style="color:#7b2cbf; font-size: 17px;  text-decoration:none; font-weight:bold;">Cadastre-se</a>
        </p>
      </div>

    </form>
  </div>

</body>
</html>

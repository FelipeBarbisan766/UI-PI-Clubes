<main class="min-h-screen w-full pattern-background flex items-center justify-center py-12 px-4 pt-20">

  <div class="card w-full max-w-lg bg-white shadow-xl rounded-3xl overflow-hidden border border-gray-100">
    <div class="card-body p-6 md:p-8">

      <div class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">
          Faça seu login
        </h1>
        <p class="text-gray-500 text-sm">
          Entre com suas credenciais para acessar sua conta.
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <div class="form-group">
          <label for="email" class="label text-gray-700 font-medium px-0 pb-2">
            <span class="label-text font-medium">E-mail</span>
          </label>

          <div class="input-wrapper flex items-center gap-2 bg-white border border-gray-200 rounded-lg focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="ml-3 opacity-50 flex-shrink-0"
              aria-hidden="true"
            >
              <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>

            <input
              id="email"
              type="email"
              formControlName="email"
              class="grow px-3 py-2 bg-transparent outline-none text-sm"
              placeholder="seu@email.com"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="label text-gray-700 font-medium px-0 pb-2">
            <span class="label-text font-medium">Senha</span>
          </label>

          <div class="input-wrapper flex items-center gap-2 bg-white border border-gray-200 rounded-lg focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="ml-3 opacity-50 flex-shrink-0"
              aria-hidden="true"
            >
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>

            <input
              id="password"
              type="password"
              formControlName="password"
              class="grow px-3 py-2 bg-transparent outline-none text-sm"
              placeholder="●●●●●●"
            />
          </div>
        </div>

        <div class="mt-2 pt-2">
          <!-- <button
            type="submit"
            class="btn btn-primary w-full rounded-full font-semibold text-white shadow-lg hover:shadow-primary/30 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="isSubmitting()"
            [attr.aria-busy]="isSubmitting()"
          >
            @if (isSubmitting()) {
              <span class="loading loading-spinner loading-sm" aria-hidden="true"></span>
              <span class="sr-only">Carregando...</span>
            } @else {
              Entrar
            }
          </button> -->
          <button
          class="btn btn-primary w-full rounded-full font-semibold text-white shadow-lg hover:shadow-primary/30 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
          
          >
            Entrar
          </button>
        </div>

        <div class="text-center pt-1">
          <p class="text-gray-500 text-xs md:text-sm">
            Não tem uma conta?
            <a routerLink="/sign-up" class="link link-primary no-underline font-semibold hover:underline">
              Criar conta
            </a>
          </p>
        </div>

      </form>
    </div>
  </div>
</main>

<div class="drawer lg:drawer-open">
  <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col min-h-screen bg-base-100">

    <nav class="navbar w-full bg-base-300 lg:hidden">
      <label for="admin-drawer" aria-label="Abrir menu" class="btn btn-square btn-ghost">
        <!-- lucide: menu -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/>
        </svg>
      </label>
      <span class="px-2 font-semibold">{{ clubName() }}</span>
    </nav>

    <div class="p-4 flex-1">
      <div class="px-4">
        <app-breadcrumb></app-breadcrumb>
      </div>
      <router-outlet></router-outlet>
    </div>

  </div>

  <div class="drawer-side z-40">
    <label for="admin-drawer" aria-label="Fechar menu" class="drawer-overlay"></label>

    <aside class="bg-base-200 border-r border-base-200 min-h-full w-64 flex flex-col">

      <div class="p-4 border-b border-base-200">
        <div class="flex items-center gap-3 p-3 rounded-xl bg-primary/10">
          <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="text-primary-content">
              <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
              <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
              <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 0-2 2h-2"/>
              <path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>
            </svg>
          </div>
          <div class="min-w-0">
            <p class="font-semibold text-sm text-primary truncate leading-tight">{{ clubName() }}</p>
            <p class="text-xs text-base-content/60 truncate">{{ clubCity() }}</p>
          </div>
        </div>

        <button
          class="btn btn-ghost btn-sm w-full mt-2 gap-2 justify-start text-base-content/70 bg-white"
          (click)="goToSwitchClub()">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/>
          </svg>
          Trocar clube
        </button>
      </div>

      <nav class="flex-1 p-3 overflow-y-auto">
        <p class="text-xs font-semibold text-base-content/40 uppercase tracking-wider px-3 mb-2">Painel</p>
        <ul class="menu menu-sm gap-0.5 p-0 w-full">

          <li>
            <button [class.active]="isActive('overview')" (click)="goToOverview(); closeDrawerOnMobile()" class="rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/>
                <rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
              </svg>
              Visão Geral
            </button>
          </li>

          <li>
            <a [class.active]="isActive('courts')" (click)="goToCourts(); closeDrawerOnMobile()" class="rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="">
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              Quadras
            </a>
          </li>

          <li>
            <a [class.active]="isActive('reserves')" (click)="goToReserves(); closeDrawerOnMobile()" class="rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="">
                <path d="M8 2v4"/><path d="M16 2v4"/>
                <rect width="18" height="18" x="3" y="4" rx="2"/>
                <path d="M3 10h18"/>
              </svg>
              Reservas
            </a>
          </li>

          <li>
            <a [class.active]="isActive('config')" (click)="goToConfig(); closeDrawerOnMobile()" class="rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              Configurações
            </a>
          </li>

        </ul>
      </nav>

      <div class="border-t border-base-200 p-3">
        <div class="flex items-center gap-3 px-2 py-1.5">
          <div class="avatar avatar-placeholder">
          <div
            class="w-24 h-24 rounded-full bg-neutral text-neutral-content relative overflow-hidden"
          >
            @if (avatarUrl(); as avatarUrl) {
              <img
                [ngSrc]="avatarUrl"
                fill
                [alt]="displayName() + ' Avatar'"
                class="object-cover"
              />
            } @else {
              <span class="text-3xl font-semibold flex items-center justify-center w-full h-full">
                {{ initials() }}
              </span>
            }
          </div>
        </div>
          <div class="min-w-0 flex-1">
            <p class="text-sm font-semibold text-base-content truncate leading-tight">{{ displayName() }}</p>
            <p class="text-xs text-base-content/50 truncate">Administrador</p>
          </div>
        </div>

        <button
          class="btn btn-ghost btn-sm w-full mt-1 gap-2 justify-start text-base-content/60"
          (click)="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair
        </button>
      </div>

    </aside>
  </div>
</div>

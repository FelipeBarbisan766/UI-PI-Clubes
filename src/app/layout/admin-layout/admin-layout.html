<div class="drawer lg:drawer-open">
  <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content">
    <div class="navbar bg-base-100 px-4 lg:hidden">
      <div class="flex-none">
        <label for="admin-drawer" class="btn btn-ghost btn-square" aria-label="Abrir menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               class="size-5">
            <path d="M4 6h16" />
            <path d="M4 12h16" />
            <path d="M4 18h16" />
          </svg>
        </label>
      </div>

      <div class="flex-1">
        <span class="text-base font-semibold">Administrador</span>
      </div>
    </div>

    <div class="p-4">
      <div class="px-4">
        <app-breadcrumb></app-breadcrumb>
      </div>

      <router-outlet></router-outlet>
    </div>
  </div>

  <div class="drawer-side is-drawer-close:overflow-visible">
    <label for="admin-drawer" class="drawer-overlay" aria-label="Fechar menu"></label>

    <div class="flex min-h-full flex-col items-start bg-base-200
                is-drawer-close:w-14 is-drawer-open:w-64">
      <ul class="menu w-full grow p-2">
        <li>
          <a
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
            data-tip="Visão Geral"
            routerLink="/admin/visao-geral"
            (click)="closeDrawerOnMobile()"
          >
            <!-- seu svg -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 stroke-linejoin="round" stroke-linecap="round" stroke-width="2"
                 fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
              <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span class="is-drawer-close:hidden">Visão Geral</span>
          </a>
        </li>

        <li>
          <a
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
            data-tip="Quadras"
            (click)="goToCourts(); closeDrawerOnMobile()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 stroke-linejoin="round" stroke-linecap="round" stroke-width="2"
                 fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M20 7h-9"></path>
              <path d="M14 17H5"></path>
              <circle cx="17" cy="17" r="3"></circle>
              <circle cx="7" cy="7" r="3"></circle>
            </svg>
            <span class="is-drawer-close:hidden">Quadras</span>
          </a>
        </li>

        <li>
          <a
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
            data-tip="Reservas"
            (click)="goToReserves(); closeDrawerOnMobile()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="my-1.5 inline-block size-4">
              <path d="M8 2v4"/><path d="M16 2v4"/>
              <rect width="18" height="18" x="3" y="4" rx="2"/>
              <path d="M3 10h18"/><path d="m9 16 2 2 4-4"/>
            </svg>
            <span class="is-drawer-close:hidden">Reservas</span>
          </a>
        </li>

        <li>
          <a
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
            data-tip="Horários"
            routerLink="/admin/horarios"
            (click)="closeDrawerOnMobile()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"
                 class="my-1.5 inline-block size-4">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            <span class="is-drawer-close:hidden">Horários</span>
          </a>
        </li>

        <li>
          <a
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
            data-tip="Configurações"
            (click)="goToConfig(); closeDrawerOnMobile()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"
                 class="my-1.5 inline-block size-4">
              <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span class="is-drawer-close:hidden">Configurações</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
